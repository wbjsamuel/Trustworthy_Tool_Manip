# Configuration for the Stage 1 pose prediction model.

data:
  path: stage1/stage1_data/parsed_taco_dataset
  val_split: 0.1

model:
  embed_dim: 2048
  num_heads: 16
  num_layers: 8
  feedforward_mult: 8
  num_fusion_tokens: 32
  image_feature_dim: 1536
  language_feature_dim: 768
  pose_dim: 16
  dino_repo: facebookresearch/dinov2
  dino_model_name: dinov2_vitb14_reg
  siglip_model_name: google/siglip-base-patch16-224
  text_model_name: t5-base
  freeze_backbones: true

training:
  batch_size: 32
  epochs: 100
  learning_rate: 0.0001
  weight_decay: 0.0001
  num_workers: 4
  seed: 42
  deterministic: true
  log_every_n_steps: 10
  checkpoint_dir: checkpoints/stage1

logging:
  use_wandb: true
  project: trustworthy_tool_manip
  run_name: stage1_transformer_training
  save_dir: logs
  mode: online

inference:
  checkpoint_path: checkpoints/stage1/last.ckpt
